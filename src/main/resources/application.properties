logging.level.root=info
logging.level.org.example=debug

song.author=Whitney Elizabeth Houston

# ==================== 阿里百炼通义千问大模型配置 ====================
# API密钥（从阿里云百炼平台获取）
spring.ai.dashscope.api-key=${A-QWEN_API_KEY}
# 模型选择：qwen-max / qwen-turbo / qwen-plus
spring.ai.dashscope.chat.model=qwen-turbo
# 随机性 0~1，越低越严谨，越高越有创意
spring.ai.dashscope.chat.temperature=0.7
# 最大输出token数
spring.ai.dashscope.chat.max-tokens=1024
